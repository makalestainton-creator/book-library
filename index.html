<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="added-confirmation js-added-confirmation">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        fill="currentColor"
        class="bi bi-check-circle"
        viewBox="0 0 16 16"
      >
        <path
          d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"
        />
        <path
          d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"
        />
      </svg>
      <p>Added successsfully</p>
    </div>
    <header>
      <div class="dashboard">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="50"
          height="50"
        >
          <path
            d="M18,22A2,2 0 0,0 20,20V4C20,2.89 19.1,2 18,2H12V9L9.5,7.5L7,9V2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18Z"
            fill="#f3b20e"
          />
        </svg>
        <div class="description">
          <p>Book Library</p>
          <p>Peek at the shelves</p>
        </div>
      </div>

      <div class="search">
        <input type="text" name="search" id="search" placeholder="Search by author, title or category"/>
        <button type="button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            height="24"
            width="24"
          >
            <path
              d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"
            />
          </svg>
        </button>
      </div>

      <button type="button" class="new-book js-new-book">New Book</button>
    </header>

    <main>
      <div class="heading">
        <h2>Your Book Shelf</h2>
        <p class="heading-illustration">
          <span class="js-read"></span> read
          <span class="js-unread"></span> unread
        </p>
      </div>

      <div class="container js-container"></div>
    </main>
    <div class="overlay js-overlay">
      <form>
        <div class="dialogue-grid">
          <div class="form-row">
            <label for="author">Author:</label>
            <input type="text" name="author" id="author" required />
          </div>
          <div class="form-row">
            <label for="title">Book Title:</label>
            <input type="text" name="title" id="title" required />
          </div>
          <div class="form-row">
            <label for="pages">Number of pages:</label>
            <input type="text" name="pages" id="pages" required />
          </div>
          <div class="form-row">
            <label for="category">Category:</label>
            <select name="category" id="category">
              <button>
                <selectedcontent></selectedcontent>
              </button>
              <option value="Romance">Romance</option>
              <option value="Mystery">Mystery</option>
              <option value="Science">Science</option>
              <option value="Fiction">Fiction</option>
              <option value="History">History</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <input type="checkbox" name="read" id="read" checked />
          <label for="read">I've read the book</label>
        </div>
        <button type="submit" class="add-book js-add-book">Add Book</button>
        <button class="close-button js-close-button" type="button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            height="24"
            width="24"
          >
            <title>close dialogue(Keyboard "Esc")</title>
            <path
              d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"
            />
          </svg>
        </button>
      </form>
    </div>

    <script src="script.js" type="module"></script>
  </body>
</html>
